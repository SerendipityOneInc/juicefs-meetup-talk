<svg viewBox="0 0 1200 560" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','IBM Plex Mono',monospace">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#aee1ff"/>
    </marker>
    <style>
      .card{ fill:rgba(255,255,255,.05); stroke:#bedcff; stroke-width:1.5; stroke-dasharray:5 4; }
      .bar{ fill:rgba(255,255,255,.05); stroke:#bedcff; stroke-width:1.5; stroke-dasharray:5 4; }
      .barGold{ fill:rgba(255,210,122,.08); stroke:#ffd27a; stroke-width:1.8; stroke-dasharray:6 4; }
      .chip{ fill:rgba(174,225,255,.10); stroke:#7da8cf; stroke-width:1; }
      .t1{ fill:#e8f3ff; } .t2{ fill:#b8d4f0; } .t3{ fill:#7da8cf; } .gold{ fill:#ffd27a; }
      .ln{ stroke:#aee1ff; stroke-width:1.6; }
      .tag{ fill:#5e88ad; font-size:12px; letter-spacing:.12em; }
    </style>
  </defs>

  <!-- layer tags (left rail) -->
  <text class="tag" x="20" y="95"  transform="rotate(-90 20 95)"  text-anchor="middle">算力 COMPUTE</text>
  <text class="tag" x="20" y="225" transform="rotate(-90 20 225)" text-anchor="middle">缓存 CACHE</text>
  <text class="tag" x="20" y="345" transform="rotate(-90 20 345)" text-anchor="middle">元数据 META</text>
  <text class="tag" x="20" y="475" transform="rotate(-90 20 475)" text-anchor="middle">对象 OBJECT</text>

  <!-- top caption -->
  <text class="t3" x="600" y="22" text-anchor="middle" font-size="13">哪里 GPU 便宜部署在哪里 · 算力漂移 · Slinky Slurm on K8S</text>

  <!-- ===== Layer 1: COMPUTE (per-cloud) ===== -->
  <rect class="card" x="60" y="40" width="480" height="112" rx="5"/>
  <text class="t1" x="300" y="74" text-anchor="middle" font-size="22" font-weight="700">Oracle OKE</text>
  <text class="t2" x="300" y="96" text-anchor="middle" font-size="13">vLLM + Slurm + KubeRay</text>
  <rect class="chip" x="92"  y="110" width="190" height="30" rx="3"/>
  <text class="t2" x="187" y="130" text-anchor="middle" font-size="12.5">GPU node + NVMe</text>
  <rect class="chip" x="318" y="110" width="190" height="30" rx="3"/>
  <text class="t2" x="413" y="130" text-anchor="middle" font-size="12.5">GPU node + NVMe</text>

  <rect class="card" x="660" y="40" width="480" height="112" rx="5"/>
  <text class="t1" x="900" y="74" text-anchor="middle" font-size="22" font-weight="700">DigitalOcean DOKS</text>
  <text class="t2" x="900" y="96" text-anchor="middle" font-size="13">vLLM + Slurm + KubeRay</text>
  <rect class="chip" x="692"  y="110" width="190" height="30" rx="3"/>
  <text class="t2" x="787" y="130" text-anchor="middle" font-size="12.5">GPU node + NVMe</text>
  <rect class="chip" x="918" y="110" width="190" height="30" rx="3"/>
  <text class="t2" x="1013" y="130" text-anchor="middle" font-size="12.5">GPU node + NVMe</text>

  <!-- arrows: COMPUTE -> CACHE (each cloud, local) -->
  <line class="ln" x1="300" y1="152" x2="300" y2="178" marker-end="url(#ar)"/>
  <line class="ln" x1="900" y1="152" x2="900" y2="178" marker-end="url(#ar)"/>

  <!-- ===== Layer 2: CACHE (per-cloud, isolated) ===== -->
  <rect class="card" x="60" y="180" width="480" height="98" rx="5"/>
  <text class="t1" x="84" y="208" font-size="16" font-weight="700">分布式缓存 · Oracle 本地</text>
  <text class="t2" x="84" y="228" font-size="12.5">cache-group peer 共享 · GPU 本地 NVMe</text>
  <text class="gold" x="516" y="252" text-anchor="end" font-size="15" font-weight="800">首读后全命中</text>
  <text class="t3"  x="516" y="268" text-anchor="end" font-size="11.5">数据集本地化 · 缓存不跨云</text>

  <rect class="card" x="660" y="180" width="480" height="98" rx="5"/>
  <text class="t1" x="684" y="208" font-size="16" font-weight="700">分布式缓存 · DigitalOcean 本地</text>
  <text class="t2" x="684" y="228" font-size="12.5">cache-group peer 共享 · GPU 本地 NVMe</text>
  <text class="gold" x="1116" y="252" text-anchor="end" font-size="15" font-weight="800">首读后全命中</text>
  <text class="t3"  x="1116" y="268" text-anchor="end" font-size="11.5">数据集本地化 · 缓存不跨云</text>

  <!-- arrows: CACHE -> META (each cloud, miss / metadata lookup) -->
  <line class="ln" x1="300" y1="278" x2="300" y2="308" marker-end="url(#ar)"/>
  <line class="ln" x1="900" y1="278" x2="900" y2="308" marker-end="url(#ar)"/>
  <text class="t3" x="316" y="298" font-size="11">miss · lookup</text>
  <text class="t3" x="916" y="298" font-size="11">miss · lookup</text>

  <!-- ===== Layer 3: METADATA (unified, spans both clouds) ===== -->
  <rect class="barGold" x="60" y="310" width="1080" height="76" rx="5"/>
  <text class="gold" x="600" y="340" text-anchor="middle" font-size="18" font-weight="700">统一元数据服务 · Unified Metadata Service</text>
  <text class="t2"   x="600" y="364" text-anchor="middle" font-size="13">跨双云共享 · 部署在 OCI · 两朵云 = 同一个文件系统、同一份数据</text>

  <!-- arrow: META -> OBJECT -->
  <line class="ln" x1="600" y1="386" x2="600" y2="428" marker-end="url(#ar)"/>
  <text class="t3" x="612" y="412" font-size="11">chunk fetch</text>

  <!-- ===== Layer 4: OBJECT ===== -->
  <rect class="bar" x="60" y="430" width="1080" height="80" rx="5"/>
  <text class="t1" x="84" y="462" font-size="17" font-weight="700">Cloudflare R2 · 对象存储</text>
  <text class="t2" x="84" y="486" font-size="13">跨云读写的统一数据池</text>
  <rect x="940" y="448" width="176" height="36" rx="4" fill="rgba(255,210,122,.12)" stroke="#ffd27a" stroke-width="1.5"/>
  <text class="gold" x="1028" y="471" text-anchor="middle" font-size="15" font-weight="700">免 egress 跨云不掏钱</text>
</svg>
